<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1B2D"/>
      <stop offset="100%" stop-color="#05080F"/>
    </linearGradient>
    <linearGradient id="bull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28E89C"/>
      <stop offset="100%" stop-color="#11A872"/>
    </linearGradient>
    <linearGradient id="bear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF5A6B"/>
      <stop offset="100%" stop-color="#CC2A3D"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <g stroke="#1A2942" stroke-width="1" opacity="0.4">
    <line x1="80" y1="256" x2="944" y2="256"/>
    <line x1="80" y1="512" x2="944" y2="512"/>
    <line x1="80" y1="768" x2="944" y2="768"/>
  </g>

  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="none" stroke="#243353" stroke-width="2"/>

  <!-- ===== TOP SERIF: 7 bullish candles, body centers near y=210 ===== -->
  <g stroke="#3CFFAE" stroke-width="3" fill="url(#bull)">
    <!-- C1 -->
    <line x1="288" y1="138" x2="288" y2="282"/>
    <rect x="270" y="175" width="36" height="65" rx="2" stroke="none"/>
    <!-- C2 -->
    <line x1="362" y1="115" x2="362" y2="270"/>
    <rect x="344" y="155" width="36" height="85" rx="2" stroke="none"/>
    <!-- C3 -->
    <line x1="436" y1="148" x2="436" y2="290"/>
    <rect x="418" y="180" width="36" height="60" rx="2" stroke="none"/>
    <!-- C4 (stem column) -->
    <line x1="510" y1="108" x2="510" y2="278"/>
    <rect x="492" y="152" width="36" height="92" rx="2" stroke="none"/>
    <!-- C5 -->
    <line x1="584" y1="142" x2="584" y2="262"/>
    <rect x="566" y="170" width="36" height="70" rx="2" stroke="none"/>
    <!-- C6 -->
    <line x1="658" y1="128" x2="658" y2="298"/>
    <rect x="640" y="165" width="36" height="75" rx="2" stroke="none"/>
    <!-- C7 -->
    <line x1="732" y1="155" x2="732" y2="275"/>
    <rect x="714" y="188" width="36" height="55" rx="2" stroke="none"/>
  </g>

  <!-- ===== STEM: 4 candles at x=510, varied heights, mostly bull ===== -->
  <!-- S1 bull -->
  <g stroke="#3CFFAE" stroke-width="3" fill="url(#bull)">
    <line x1="510" y1="310" x2="510" y2="448"/>
    <rect x="492" y="340" width="36" height="85" rx="2" stroke="none"/>
  </g>
  <!-- S2 bear (a pullback candle, adds realism) -->
  <g stroke="#FF7A89" stroke-width="3" fill="url(#bear)">
    <line x1="510" y1="468" x2="510" y2="582"/>
    <rect x="492" y="492" width="36" height="68" rx="2" stroke="none"/>
  </g>
  <!-- S3 bull -->
  <g stroke="#3CFFAE" stroke-width="3" fill="url(#bull)">
    <line x1="510" y1="598" x2="510" y2="720"/>
    <rect x="492" y="622" width="36" height="78" rx="2" stroke="none"/>
  </g>
  <!-- S4 bull (last stem candle, slightly larger) -->
  <g stroke="#3CFFAE" stroke-width="3" fill="url(#bull)">
    <line x1="510" y1="738" x2="510" y2="860"/>
    <rect x="492" y="760" width="36" height="88" rx="2" stroke="none"/>
  </g>

  <!-- ===== HOOK: bearish candles bottom-left forming the curve ===== -->
  <g stroke="#FF7A89" stroke-width="3" fill="url(#bear)">
    <!-- H1 -->
    <line x1="288" y1="822" x2="288" y2="950"/>
    <rect x="270" y="848" width="36" height="80" rx="2" stroke="none"/>
    <!-- H2 -->
    <line x1="362" y1="800" x2="362" y2="942"/>
    <rect x="344" y="832" width="36" height="92" rx="2" stroke="none"/>
    <!-- H3 -->
    <line x1="436" y1="818" x2="436" y2="935"/>
    <rect x="418" y="845" width="36" height="75" rx="2" stroke="none"/>
  </g>
</svg>
