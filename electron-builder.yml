# electron-builder config for Journal (crypto-spread-journal).
#
# Decisions:
#   - YAML over package.json: keeps the root manifest tidy and gives us inline
#     comments per setting.
#   - macOS-only targets this session per the spec; the `mac` block is set up
#     so adding `win` / `linux` later is just appending top-level keys.
#   - We package the Next.js *standalone* bundle (.next/standalone) plus
#     the static assets (.next/static) and public/. server.js inside the
#     standalone tree is what main.ts spawns at runtime.
#   - asar = true; `.next/standalone` is the heaviest payload but doesn't
#     need to be unpacked (it's all .js, read-only). If postgres native
#     bindings or PGlite WASM end up in node_modules and break asar, add
#     them to `asarUnpack` rather than disabling asar wholesale.
#   - Signing left to the user. The notarize / signing IDs come from env
#     vars (`CSC_*`, `APPLE_ID`, `APPLE_APP_SPECIFIC_PASSWORD`,
#     `APPLE_TEAM_ID`); if they aren't set, electron-builder produces an
#     unsigned .dmg, which still launches with right-click → Open.

appId: com.cryptojournal.app
productName: Journal
copyright: Copyright © 2026 ${author}

# Where the .dmg/.zip outputs land. `dist/` is already a Next.js artifact dir
# in some setups, so we keep a distinct directory.
directories:
  buildResources: electron/build
  output: dist-electron

# Compiled main+preload + Next.js standalone runtime + static assets.
# Globs are relative to the project root.
#
# .next/standalone already contains its own server.js + minimum node_modules.
# `pnpm electron:prepare-standalone` (scripts/prepare-standalone.mjs, run
# before electron-builder) copies .next/static and public/ INTO
# .next/standalone/ — Next's documented layout requirement — so we don't
# ship duplicate top-level copies.
#
# That step ALSO dereferences every symlink inside .next/standalone. Next 16
# standalone output (with serverExternalPackages) emits a hash-suffixed
# symlink for PGlite under .next/standalone/.next/node_modules; a symlink
# inside the asar payload breaks packaging on BOTH platforms (macOS asar
# packer: "not a file"; Windows 7za: "path not found"). Dereferencing turns
# the bundle into a plain file tree. See scripts/prepare-standalone.mjs.
files:
  - electron/dist/**/*
  - .next/standalone/**/*
  # Migrations ship with the app so the DB layer can apply them on first run.
  # (PGlite ignores Postgres-specific features, but the migration runner
  # owned by the DB agent decides what to do.)
  - supabase/migrations/**/*
  - package.json
  - "!**/.DS_Store"
  - "!**/*.map"
  - "!**/node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/**/{test,tests,__tests__,__mocks__,powered-test,example,examples}/**/*"
  - "!**/node_modules/**/*.d.ts"

# Unpack the Next.js standalone bundle so that:
#  1) `node server.js` can stat-and-read regular files (asar fs shimming is
#     reliable for the renderer but flakier for child processes), and
#  2) PGlite / native modules bundled by Next's tracer can dlopen .node files.
asar: true
asarUnpack:
  - .next/standalone/**/*
compression: maximum
# Version-LESS artifact names. This is deliberate: it makes
#   https://github.com/<owner>/<repo>/releases/latest/download/Journal-mac-arm64.dmg
# a permanent direct-download URL that always serves the newest release, so
# the README can link straight to the installer without editing it per
# release. electron-updater doesn't need the version in the filename — it
# reads the `version:` field inside latest-mac.yml / latest.yml instead.
artifactName: ${productName}-${os}-${arch}.${ext}

# Skip @electron/rebuild — we have no native node deps that need recompiling
# (PGlite is WASM, postgres.js is pure JS). The rebuild step was triggering
# `not a file` errors on macOS specifically when probing the project root.
npmRebuild: false
nodeGypRebuild: false

mac:
  category: public.app-category.finance
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  # Ad-hoc sign (`identity: '-'`) instead of a real Developer ID. arm64
  # binaries on macOS 11+ won't launch without ANY signature — and with
  # `identity: null` electron-builder produces only a linker-level adhoc
  # sig on the main binary while the framework + helpers go unsigned,
  # which macOS silently kills. `'-'` makes electron-builder run
  # `codesign --sign -` deeply across the bundle at packaging time, which
  # is what we previously did by hand after every build.
  #
  # End-users still see a Gatekeeper "downloaded from the internet" prompt
  # on first launch; the workaround is documented in
  # electron/CODESIGNING.md. For real distribution, swap `'-'` for a
  # Developer ID via env-driven `CSC_LINK` + `APPLE_*` secrets.
  identity: "-"
  notarize: false

dmg:
  sign: false

# ============================================================================
# Publish target — consumed by electron-updater at runtime to discover
# available updates, and by electron-builder when invoked with `--publish`
# (which is what the GitHub Actions release workflow does).
#
# Channel defaults to `latest`; pre-releases get `beta`/`alpha` channels if we
# decide to ship them later. Releases must be marked "non-prerelease" on GitHub
# for electron-updater to pick them up by default.
# ============================================================================
publish:
  provider: github
  owner: DiamondDime
  repo: trading-journal
  releaseType: release

# ============================================================================
# Windows build target — NSIS installer, x64 only.
#
# Decisions:
#   - UNSIGNED. The user explicitly chose not to purchase a code-signing cert.
#     SmartScreen will warn on first run; users right-click → Run anyway.
#     See ELECTRON.md → "Windows install" for the user-facing flow.
#   - x64 only. Skipping arm64 keeps the matrix simple; <1% of Windows traders
#     are on ARM today, and we can add it later when electron-builder's NSIS
#     arm64 story stabilises.
#   - oneClick: false + perMachine: false → per-USER install (writes to
#     %LOCALAPPDATA%, no UAC elevation prompt). User can also change the
#     install directory.
#   - The same `publish:` block above drives uploads for Windows: the GH
#     Actions workflow's build-win job uses softprops/action-gh-release to
#     attach the .exe + latest.yml to the same release the Mac job creates.
# ============================================================================
win:
  target:
    - target: nsis
      arch:
        - x64
  # No signing — leave `signAndEditExecutable` defaulted (true) so the .exe
  # metadata is at least populated, even unsigned.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Show a finish page so users know the install completed.
  allowElevation: false
  deleteAppDataOnUninstall: false
  # Shortcut + Start-menu entry so the app shows up in Win+S search.
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Journal
