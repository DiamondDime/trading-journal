name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:run
      - run: pnpm build

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev --frozen
      - run: uv run pytest

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crypto_journal
          POSTGRES_USER: crypto_journal
          POSTGRES_PASSWORD: crypto_journal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crypto_journal -d crypto_journal"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGUSER: crypto_journal
      PGPASSWORD: crypto_journal
      PGDATABASE: crypto_journal
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Apply migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "-- $f"
            psql -v ON_ERROR_STOP=1 -f "$f" || exit 1
          done
